<!DOCTYPE html>
<html lang="es-DO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Canonical (base) -->
    <link rel="canonical" href="https://mcbeautyfragrance.com/" />

    <!-- Preload banner -->
    <link
      rel="preload"
      as="image"
      href="/banner.webp"
      imagesrcset="/banner.webp"
      fetchpriority="high"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- SEO principal -->
    <title>Perfumes, Cremas y Moda en RD | MC Beauty & Fragrance</title>
    <meta
      name="description"
      content="Compra perfumes y cremas 100% originales en República Dominicana. Atención por WhatsApp y transferencias bancarias disponibles. MC Beauty & Fragrance."
    />
    <meta name="robots" content="index, follow" />

    <!-- Color navegador móvil -->
    <meta name="theme-color" content="#fdecef" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="MC Beauty & Fragrance" />
    <meta property="og:title" content="MC Beauty & Fragrance | Tienda en RD" />
    <meta
      property="og:description"
      content="Perfumes y cremas originales en RD, atención por WhatsApp y transferencias bancarias."
    />
    <meta property="og:image" content="https://mcbeautyfragrance.com/banner.webp" />
    <meta property="og:url" content="https://mcbeautyfragrance.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_DO" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MC Beauty & Fragrance | Tienda en RD" />
    <meta
      name="twitter:description"
      content="Compra perfumes y cremas originales en RD con atención por WhatsApp y transferencias bancarias."
    />
    <meta name="twitter:image" content="https://mcbeautyfragrance.com/banner.webp" />

    <!-- ========================= -->
    <!-- SCHEMA PROFESIONAL COMPLETO -->
    <!-- ========================= -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [

          {
            "@type": "Organization",
            "@id": "https://mcbeautyfragrance.com/#organization",
            "name": "MC Beauty & Fragrance",
            "url": "https://mcbeautyfragrance.com",
            "logo": {
              "@type": "ImageObject",
              "url": "https://mcbeautyfragrance.com/logo.png"
            },
            "email": "mcbeautyfragrance@gmail.com",
            "sameAs": [
              "https://www.facebook.com/mcbeautyfragrance/",
              "https://www.instagram.com/mcbeautyfragrance",
              "https://www.tiktok.com/@mcbeautyfragrance"
            ],
            "contactPoint": [
              {
                "@type": "ContactPoint",
                "telephone": "+1-829-728-3652",
                "contactType": "customer service",
                "areaServed": "DO",
                "availableLanguage": ["es"]
              }
            ]
          },

          {
            "@type": "OnlineStore",
            "@id": "https://mcbeautyfragrance.com/#store",
            "name": "MC Beauty & Fragrance",
            "url": "https://mcbeautyfragrance.com",
            "image": "https://mcbeautyfragrance.com/banner.webp",
            "description": "Tienda online en República Dominicana especializada en perfumes, body mists, cremas, lociones y moda. Atención por WhatsApp y pagos por transferencia.",
            "priceRange": "RD$300 - RD$6,000+",
            "paymentAccepted": "Bank Transfer",
            "currenciesAccepted": "DOP",
            "areaServed": {
              "@type": "Country",
              "name": "Dominican Republic"
            },
            "address": {
              "@type": "PostalAddress",
              "addressCountry": "DO"
            },
            "brand": {
              "@type": "Organization",
              "@id": "https://mcbeautyfragrance.com/#organization"
            },
            "hasOfferCatalog": {
              "@type": "OfferCatalog",
              "name": "Catálogo de productos",
              "itemListElement": [
                { "@type": "OfferCatalog", "name": "Perfumes" },
                { "@type": "OfferCatalog", "name": "Body Mists / Splash" },
                { "@type": "OfferCatalog", "name": "Cremas y Lociones" },
                { "@type": "OfferCatalog", "name": "Pijamas y Moda" }
              ]
            },
            "openingHoursSpecification": [
              {
                "@type": "OpeningHoursSpecification",
                "dayOfWeek": "Sunday",
                "opens": "09:30",
                "closes": "14:30"
              },
              {
                "@type": "OpeningHoursSpecification",
                "dayOfWeek": [
                  "Monday",
                  "Tuesday",
                  "Wednesday",
                  "Thursday"
                ],
                "opens": "09:00",
                "closes": "19:00"
              },
              {
                "@type": "OpeningHoursSpecification",
                "dayOfWeek": "Friday",
                "opens": "09:00",
                "closes": "18:00"
              }
            ]
          }

        ]
      }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
